name: Anki Word Converter

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Input file path (e.g., words.txt)'
        required: true
        default: 'words.txt'
        type: string
      
      output_format:
        description: 'Output format'
        required: false
        default: 'csv'
        type: choice
        options:
          - csv
          - apkg
      
      quiz_mode:
        description: 'Enable quiz mode (Baicizhan style)'
        required: false
        default: 'false'
        type: boolean
      
      num_distractors:
        description: 'Number of distractors for quiz mode'
        required: false
        default: '3'
        type: string
      
      use_ai:
        description: 'Use AI for recognition'
        required: false
        default: 'true'
        type: boolean

      # API Configuration - User Input Fields
      api_key:
        description: 'API Key (input your API key here, leave empty to use config)'
        required: false
        default: ''
        type: string
      
      base_url:
        description: 'API Base URL (input custom URL, e.g., https://api.openai.com/v1)'
        required: false
        default: ''
        type: string
      
      model:
        description: 'AI Model (input model name, e.g., gpt-3.5-turbo, gpt-4)'
        required: false
        default: ''
        type: string
      
      temperature:
        description: 'Temperature (input 0.0-1.0, lower = more deterministic)'
        required: false
        default: ''
        type: string
      
      max_tokens:
        description: 'Max Tokens (input maximum response tokens)'
        required: false
        default: ''
        type: string

  push:
    branches:
      - main
    paths:
      - '**.txt'
      - '**.docx'

permissions:
  contents: read
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check input file
        run: |
          if [ ! -f "${{ github.event.inputs.input_file || 'words.txt' }}" ]; then
            echo "Error: Input file '${{ github.event.inputs.input_file || 'words.txt' }}' not found"
            exit 1
          fi
          echo "Input file exists: ${{ github.event.inputs.input_file || 'words.txt' }}"

      - name: Run conversion with user inputs
        env:
          API_KEY: ${{ github.event.inputs.api_key }}
          BASE_URL: ${{ github.event.inputs.base_url }}
          MODEL: ${{ github.event.inputs.model }}
          TEMPERATURE: ${{ github.event.inputs.temperature }}
          MAX_TOKENS: ${{ github.event.inputs.max_tokens }}
        run: |
          ARGS="--format ${{ github.event.inputs.output_format || 'csv' }}"
          
          if [ "${{ github.event.inputs.quiz_mode }}" = "true" ]; then
            ARGS="$ARGS --quiz-mode"
            ARGS="$ARGS --num-distractors ${{ github.event.inputs.num_distractors || '3' }}"
          fi
          
          if [ "${{ github.event.inputs.use_ai }}" = "false" ]; then
            ARGS="$ARGS --no-ai"
          fi
          
          if [ -n "$API_KEY" ] && [ "$API_KEY" != "" ]; then
            ARGS="$ARGS --api-key \"$API_KEY\""
          fi
          
          if [ -n "$BASE_URL" ] && [ "$BASE_URL" != "" ]; then
            ARGS="$ARGS --base-url \"$BASE_URL\""
          fi
          
          if [ -n "$MODEL" ] && [ "$MODEL" != "" ]; then
            ARGS="$ARGS --model \"$MODEL\""
          fi
          
          if [ -n "$TEMPERATURE" ] && [ "$TEMPERATURE" != "" ]; then
            ARGS="$ARGS --temperature $TEMPERATURE"
          fi
          
          if [ -n "$MAX_TOKENS" ] && [ "$MAX_TOKENS" != "" ]; then
            ARGS="$ARGS --max-tokens $MAX_TOKENS"
          fi
          
          echo "Running command: python main.py \"${{ github.event.inputs.input_file || 'words.txt' }}\" $ARGS"
          python main.py "${{ github.event.inputs.input_file || 'words.txt' }}" $ARGS

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: anki-cards
          path: |
            *.csv
            *.apkg
          retention-days: 7

      - name: List generated files
        run: |
          echo "Generated files:"
          ls -lh *.csv *.apkg 2>/dev/null || echo "No output files generated"