<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anki单词转换器 - Web界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 1.1em;
        }

        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group .hint {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: 1.1em;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .file-upload {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .file-upload:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .file-upload input {
            display: none;
        }

        .file-upload .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .file-upload .text {
            color: #667eea;
            font-weight: 600;
        }

        .file-upload .hint {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 8px;
            color: white;
        }

        .feature h3 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .feature p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .btn {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading .btn .spinner {
            display: inline-block;
        }

        .loading .btn .btn-text {
            display: none;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }

        .footer a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Anki单词转换器</h1>
            <p>将Word/TXT文档转换为Anki记忆卡 - 支持百词斩风格选择题</p>
        </div>

        <div class="card">
            <form id="convertForm">
                <div class="form-group">
                    <label>上传文件</label>
                    <div class="file-upload" id="fileUpload">
                        <input type="file" id="fileInput" accept=".txt,.docx">
                        <div class="icon">📁</div>
                        <div class="text">点击选择文件或拖拽文件到此处</div>
                        <div class="hint">支持 .txt 和 .docx 格式</div>
                    </div>
                    <div id="fileName" style="margin-top: 10px; font-weight: 600; color: #667eea;"></div>
                </div>

                <div class="form-group">
                    <label for="outputFormat">输出格式</label>
                    <select id="outputFormat">
                        <option value="csv">CSV 格式</option>
                        <option value="apkg">APKG 格式 (Anki牌组)</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="quizMode">
                    <label for="quizMode">启用选择题模式（百词斩风格）</label>
                </div>

                <div class="form-group" id="distractorsGroup" style="display: none;">
                    <label for="numDistractors">干扰项数量</label>
                    <select id="numDistractors">
                        <option value="3">3个选项</option>
                        <option value="4">4个选项</option>
                        <option value="5">5个选项</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="useAI" checked>
                    <label for="useAI">使用AI识别（需要配置API Key）</label>
                </div>

                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="输入API Key（可选）">
                    <div class="hint">留空将使用配置文件中的API Key</div>
                </div>

                <div class="form-group">
                    <label for="baseUrl">API Base URL</label>
                    <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
                    <div class="hint">留空将使用配置文件中的API地址</div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn" id="submitBtn">
                        <span class="btn-text">开始转换</span>
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">重置</button>
                </div>
            </form>

            <div id="result" class="result"></div>
        </div>

        <div class="footer">
            <p>基于 OpenAI API 构建 | <a href="https://github.com">GitHub</a></p>
        </div>
    </div>

    <script>
        const fileUpload = document.getElementById('fileUpload');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const quizMode = document.getElementById('quizMode');
        const distractorsGroup = document.getElementById('distractorsGroup');
        const result = document.getElementById('result');
        const form = document.getElementById('convertForm');
        const submitBtn = document.getElementById('submitBtn');

        let selectedFile = null;

        fileUpload.addEventListener('click', () => fileInput.click());

        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.style.background = 'rgba(102, 126, 234, 0.2)';
        });

        fileUpload.addEventListener('dragleave', () => {
            fileUpload.style.background = '';
        });

        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.style.background = '';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const validTypes = ['.txt', '.docx'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();

            if (!validTypes.includes(ext)) {
                showResult('error', '不支持的文件格式！请上传 .txt 或 .docx 文件。');
                return;
            }

            selectedFile = file;
            fileName.textContent = '已选择: ' + file.name;
            fileName.style.display = 'block';
        }

        quizMode.addEventListener('change', () => {
            distractorsGroup.style.display = quizMode.checked ? 'block' : 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFile) {
                showResult('error', '请选择文件！');
                return;
            }

            const useAI = document.getElementById('useAI').checked;
            const apiKey = document.getElementById('apiKey').value;
            const baseUrl = document.getElementById('baseUrl').value;

            if (useAI && !apiKey) {
                showResult('error', '启用AI模式需要提供API Key！');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span><span class="btn-text">处理中...</span>';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('output_format', document.getElementById('outputFormat').value);
            formData.append('quiz_mode', quizMode.checked);
            formData.append('num_distractors', document.getElementById('numDistractors').value);
            formData.append('use_ai', useAI);
            if (apiKey) formData.append('api_key', apiKey);
            if (baseUrl) formData.append('base_url', baseUrl);

            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('success', `转换成功！生成了 ${data.cards_count} 张卡片。<br><a href="${data.download_url}" download>点击下载</a>`);
                } else {
                    showResult('error', `转换失败: ${data.error}`);
                }
            } catch (error) {
                showResult('error', `请求失败: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="btn-text">开始转换</span>';
            }
        });

        function showResult(type, message) {
            result.className = 'result ' + type;
            result.innerHTML = message;
            result.style.display = 'block';
        }

        function resetForm() {
            form.reset();
            selectedFile = null;
            fileName.textContent = '';
            fileName.style.display = 'none';
            distractorsGroup.style.display = 'none';
            result.style.display = 'none';
        }
    </script>
</body>
</html>
